<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日运动</title>
  <link rel="stylesheet" href="/styles.css?v=20260504-4">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">今日运动</p>
        <h1>今天随机一次，做完就记下来</h1>
        <p class="subtext" id="sessionGreeting">正在确认登录状态...</p>
      </div>
      <div class="header-actions">
        <a class="link-button secondary" href="/records.html">查看记录</a>
        <button class="ghost-button" id="logoutButton" type="button">退出登录</button>
      </div>
    </header>

    <section class="session-chip" id="sessionChip" aria-live="polite"></section>

    <section class="settings-panel">
      <div class="settings-head">
        <div>
          <p class="eyebrow">账号设置</p>
          <h2 class="settings-title">修改自己的密码</h2>
          <p class="subtext">输入当前密码，再设置一个新的登录密码。</p>
        </div>
      </div>
      <section class="status" id="passwordStatus"></section>
      <form class="password-form" id="passwordForm">
        <label>
          当前密码
          <input type="password" name="currentPassword" autocomplete="current-password" required>
        </label>
        <label>
          新密码
          <input type="password" name="newPassword" minlength="4" autocomplete="new-password" required>
        </label>
        <label>
          确认新密码
          <input type="password" name="confirmPassword" minlength="4" autocomplete="new-password" required>
        </label>
        <button type="submit">修改密码</button>
      </form>
    </section>

    <section class="summary-grid home-scoreboard" id="scoreboard" aria-live="polite"></section>

    <section class="status" id="status">正在读取今日运动...</section>

    <section class="task-list" id="taskList" aria-live="polite"></section>
  </main>

  <script src="/app.js?v=20260505-1"></script>
</body>
</html>
