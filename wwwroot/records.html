<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>运动记录</title>
  <link rel="stylesheet" href="/styles.css?v=20260504-4">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">历史记录</p>
        <h1>本周总分和历史记录</h1>
        <p class="subtext" id="sessionGreeting">正在确认登录状态...</p>
      </div>
      <div class="header-actions">
        <a class="link-button secondary" href="/">返回主页</a>
        <button class="ghost-button" id="logoutButton" type="button">退出登录</button>
      </div>
    </header>

    <section class="summary-grid" id="weekSummary" aria-live="polite"></section>

    <section class="settings-panel">
      <div class="settings-head">
        <div>
          <p class="eyebrow">账号设置</p>
          <h2 class="settings-title">修改自己的密码</h2>
          <p class="subtext">修改后，下次登录请使用新密码。</p>
        </div>
      </div>
      <section class="status" id="passwordStatus"></section>
      <form class="password-form" id="passwordForm">
        <label>
          当前密码
          <input type="password" name="currentPassword" autocomplete="current-password" required>
        </label>
        <label>
          新密码
          <input type="password" name="newPassword" minlength="4" autocomplete="new-password" required>
        </label>
        <label>
          确认新密码
          <input type="password" name="confirmPassword" minlength="4" autocomplete="new-password" required>
        </label>
        <button type="submit">修改密码</button>
      </form>
    </section>

    <section class="admin-panel" id="sportAdminSection" hidden>
      <div class="admin-panel-head">
        <div>
          <p class="eyebrow">项目管理</p>
          <h2 class="admin-title">管理员可以新增和修改运动项目</h2>
          <p class="subtext">这里设置项目名称、单位类型和每天随机目标范围。修改后会影响之后随机生成的任务。</p>
        </div>
      </div>

      <section class="status" id="sportAdminStatus">正在读取运动项目...</section>

      <form class="sport-editor sport-editor-create" id="createSportForm">
        <div class="sport-editor-grid">
          <label>
            项目名称
            <input type="text" name="name" placeholder="例如：深蹲" required>
          </label>
          <label>
            类型
            <select name="kind">
              <option value="Count">次数</option>
              <option value="TimeMinutes">分钟</option>
              <option value="TimeSeconds">秒</option>
            </select>
          </label>
          <label>
            最小随机值
            <input type="number" name="minTarget" min="1" step="1" required>
          </label>
          <label>
            最大随机值
            <input type="number" name="maxTarget" min="1" step="1" required>
          </label>
        </div>
        <div class="sport-editor-actions">
          <span class="meta-note">新增后会加入之后每天的随机抽取。</span>
          <button type="submit">新增项目</button>
        </div>
      </form>

      <section class="sport-admin-list" id="sportAdminList" aria-live="polite"></section>
    </section>

    <form class="filters" id="filters">
      <label>
        日期
        <input type="date" name="date">
      </label>
      <label id="userFilterWrap">
        用户
        <select name="user">
          <option value="">全部</option>
          <option value="哥哥">哥哥</option>
          <option value="弟弟">弟弟</option>
        </select>
      </label>
      <label>
        项目
        <select name="sport" id="sportFilter">
          <option value="">全部</option>
        </select>
      </label>
      <button type="submit">筛选</button>
    </form>

    <section class="status" id="status">正在读取记录...</section>

    <section class="records" id="records" aria-live="polite"></section>
  </main>

  <script src="/records.js?v=20260505-1"></script>
</body>
</html>
